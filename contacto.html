<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Contacto — Knockout League</title>
<link rel="stylesheet" href="shared.css?v=2"/>
</head>
<body>
<nav>
  <a href="index.html" class="nav-logo"><span class="nav-logo-mark">KL</span><span class="nav-logo-text">KNOCKOUT<span>LEAGUE</span></span></a>
  <button class="nav-mobile-toggle">☰</button>
  <ul class="nav-links">
    <li><a href="index.html">Início</a></li>
    <li><a href="torneios.html">Torneios</a></li>
    <li><a href="criar-torneio.html">Criar torneio</a></li>
    <li><a href="faq.html">FAQ</a></li>
    <li><a href="contacto.html" class="active">Contacto</a></li>
    <li id="nav-user-area"><a href="login.html">Entrar</a></li>
  </ul>
</nav>

<div class="wrap page-head">
  <div class="eyebrow">Fala connosco</div>
  <h1>Contacto</h1>
</div>

<div class="wrap-narrow" style="padding-bottom:100px;">
  <p class="muted" style="margin-bottom:30px;">Dúvidas, sugestões, ou algum problema numa sala? Escreve-nos.</p>

  <div class="form-error" id="c-error"></div>
  <div id="c-ok" class="card" style="display:none;margin-bottom:20px;border-color:var(--win);color:var(--win);">Mensagem enviada. Obrigado — respondemos assim que possível.</div>

  <div id="c-form">
    <div class="form-group"><label>Nome</label><input type="text" id="c-nome" placeholder="O teu nome"/></div>
    <div class="form-group"><label>Email</label><input type="email" id="c-email" placeholder="email@exemplo.com"/></div>
    <div class="form-group"><label>Mensagem</label><textarea id="c-msg" rows="6" placeholder="Escreve a tua mensagem aqui..." style="width:100%;padding:12px 14px;background:var(--surface);border:1px solid var(--line);color:var(--ink);font-family:'Inter';font-size:0.95rem;resize:vertical;"></textarea></div>
    <button type="button" class="btn btn-accent" id="c-submit" style="width:100%;">Enviar mensagem</button>
  </div>
</div>

<footer><span>© 2026 Knockout League</span></footer>

<script src="shared.js"></script>
<script type="module">
import { db, collection, addDoc, serverTimestamp } from './firebase.js';

function showError(msg){ const el = document.getElementById('c-error'); el.textContent = msg; el.style.display = 'block'; }

document.getElementById('c-submit').addEventListener('click', async function(){
  document.getElementById('c-error').style.display = 'none';
  const nome = document.getElementById('c-nome').value.trim();
  const email = document.getElementById('c-email').value.trim();
  const msg = document.getElementById('c-msg').value.trim();
  if(!nome){ showError('Escreve o teu nome.'); return; }
  if(!email){ showError('Escreve o teu email.'); return; }
  if(!msg){ showError('Escreve a tua mensagem.'); return; }

  const btn = document.getElementById('c-submit');
  btn.disabled = true; btn.textContent = 'A enviar...';
  try{
    await addDoc(collection(db,'contactos'), { nome, email, mensagem: msg, createdAt: serverTimestamp() });
    document.getElementById('c-form').style.display = 'none';
    document.getElementById('c-ok').style.display = 'block';
  }catch(err){
    showError('Erro ao enviar: ' + err.message);
    btn.disabled = false; btn.textContent = 'Enviar mensagem';
  }
});
</script>
<script type="module" src="nav-auth.js"></script>
</body>
</html>
